version: 2
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor:
        update-types: [minor, patch]

  # GitHub Actions used in the workflows above.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base images referenced in the Dockerfile (rust builder, distroless runtime).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
