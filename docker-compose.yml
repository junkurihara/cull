# docker compose up --build
#
# Runtime container for cull (design.md §9). This is the *runtime*
# deployment, distinct from the Claude Code dev sandbox.
services:
  cull:
    build:
      context: .
    image: cull:latest
    container_name: cull

    # Run as uid/gid 1000 (match the image owner's uid) so rename(2) into keep/trash has
    # write permission on the bind-mounted output volume. Non-root.
    user: "1000:1000"

    # Hardening: no privilege escalation, drop all capabilities, read-only root
    # filesystem. The app writes only into the mounted output volume (keep/trash
    # default to children of SOURCE_DIR), never to the container rootfs.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    environment:
      SOURCE_DIR: /data/images
      # KEEP_DIR / TRASH_DIR default to $SOURCE_DIR/keep and /trash, which keeps
      # them on the same filesystem as the source (rename(2) requirement).
      BIND_ADDR: 0.0.0.0:8080
      ORDER: asc
      # EXTENSIONS: png,jpg,jpeg,webp
      # UNDO_DEPTH: "50"
      # UTC offset (whole hours) for the daily-stats day boundary, e.g. 9 = JST.
      TZ_OFFSET_HOURS: "${TZ_OFFSET_HOURS:-0}"
      RUST_LOG: info

    # Mount the image directory read-write (move needs to write keep/trash).
    # Override the host path via IMAGE_DIR in a .env file if needed.
    volumes:
      - ${IMAGE_DIR:-/data/images}:/data/images:rw

    # Publish the port for direct/local access. Behind a TLS-terminating
    # reverse proxy, drop `ports` and attach the shared proxy network instead
    # (see below); the app itself implements no authentication (§9).
    ports:
      - "8080:8080"

    restart: unless-stopped

    # No healthcheck: the distroless image has no shell or curl to probe with,
    # and the app exposes no health endpoint. Liveness is observed via logs.

# Reverse-proxy integration (TLS terminated upstream): remove the `ports`
# mapping above and uncomment the network wiring below so the proxy can reach
# the plain-HTTP app over a shared docker network.
#
#    networks:
#      - edge
#
# networks:
#   edge:
#     external: true
#     name: edge
